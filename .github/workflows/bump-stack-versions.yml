---

name: Bump start-stack versions

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2026.10.02)"
        required: true
        type: string
      versions_json:
        description: 'JSON component versions, e.g. {"api": "v35.3.0", "app": "v12.10.0", "db": "5.5.0-3"}'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dsp-tools repo
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        run: python scripts/bump_stack_versions.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_JSON: ${{ inputs.GHA_WORKFLOW_INPUTS }}
