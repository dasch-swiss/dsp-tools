---

name: Bump start-stack versions

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Release name, e.g. 2026.10.02'
        required: true
        type: string
      api:
        description: 'DSP-API / Sipi / Ingest version, e.g. v35.3.0'
        required: true
        type: string
      app:
        description: 'DSP-APP version, e.g. v12.10.0'
        required: true
        type: string
      db:
        description: 'Fuseki version, e.g. 5.5.0-3'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dsp-tools repo
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        run: python scripts/bump_stack_versions.py
        env:
          # Do not use the default token (GITHUB_TOKEN) for this action,
          # as any actions triggered by the user of this token will not trigger further actions
          # (i.e. tests on the version bumping PR).
          # See https://github.com/googleapis/release-please-action and 
          # https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/triggering-a-workflow#triggering-a-workflow-from-a-workflow
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}
          RELEASE: ${{ inputs.release }}
          API: ${{ inputs.api }}
          APP: ${{ inputs.app }}
          DB: ${{ inputs.db }}
