---

name: Tests

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: read

env:
  DSP_TOOLS_TESTING: true

jobs:
  unittests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dsp-tools repo
        uses: actions/checkout@v6
      - name: Install uv, just, and dependencies
        uses: ./.github/actions/setup
      - name: unittests
        run: just unittests --cov=dsp_tools --cov-report xml
      - name: save coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unittests
          path: coverage.xml

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dsp-tools repo
        uses: actions/checkout@v6
      - name: Install uv, just, and dependencies
        uses: ./.github/actions/setup
      - name: integration-tests
        run: just integration-tests --cov=dsp_tools --cov-report xml
      - name: save coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.xml

  upload-coverage:
    runs-on: ubuntu-latest
    needs: [unittests, integration]
    steps:
      - name: download unittests coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-unittests
          path: coverage/unittests
      - name: download integration coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage/integration
      - name: upload unittests coverage to codecov.io
        uses: codecov/codecov-action@v5
        with:
          files: coverage/unittests/coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: upload integration coverage to codecov.io
        uses: codecov/codecov-action@v5
        with:
          files: coverage/integration/coverage.xml
          flags: integration-tests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  benchmarking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dsp-tools repo
        uses: actions/checkout@v6
      - name: Install uv, just, and dependencies
        uses: ./.github/actions/setup
      - name: benchmarking
        run: uv run pytest -s test/benchmarking/

  distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dsp-tools repo
        uses: actions/checkout@v6
      - name: Install python, pytest, uv, build & install wheel
        uses: ./.github/actions/setup-from-wheel
      - name: start stack
        run: uv run dsp-tools start-stack --no-prune --with-test-data
      - name: distribution tests
        run: python -m pytest --noconftest test/distribution/
        # Reason for the --noconftest flag: 
        # test/conftest.py configures logging, but loguru should not be installed for the distribution tests
      - name: stop stack
        run: uv run dsp-tools stop-stack
