---
# Enabled by `dsp-tools start-stack --otlp-endpoint <ENDPOINT>`.
#
# Adds a Grafana Alloy collector that gathers DSP metrics and forwards them to the
# OTLP endpoint passed via --otlp-endpoint (injected into config.alloy at startup).
#   - dsp-api and dsp-ingest push OTLP metrics to Alloy via their OTel Java agent.
#   - Fuseki metrics are scraped by Alloy directly (see config.alloy); the db
#     service is intentionally left untouched so it is not re-created after the
#     ontologies have been loaded into it.
#
# dsp-api and dsp-ingest additionally run the Pyroscope profiler (bundled in the
# images) and push profiles directly to http://host.docker.internal:4040, i.e. a
# Pyroscope endpoint on the host (e.g. a local Grafana otel-lgtm, which must
# publish port 4040). The db service is not profiled, for the same
# no-recreation reason as above.

services:
  api:
    environment:
      - JAVA_TOOL_OPTIONS=-javaagent:/usr/local/lib/opentelemetry-javaagent.jar
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=DSP_svc_api
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_JAVAAGENT_EXTENSIONS=/usr/local/lib/pyroscope-otel.jar
      - PYROSCOPE_SERVER_ADDRESS=http://host.docker.internal:4040
      - PYROSCOPE_APPLICATION_NAME=DSP_svc_api
      - PYROSCOPE_FORMAT=jfr
      - PYROSCOPE_PROFILER_ALLOC=512k
      - OTEL_PYROSCOPE_ADD_PROFILE_URL=false
      - OTEL_PYROSCOPE_ADD_PROFILE_BASELINE_URL=false
      - OTEL_PYROSCOPE_START_PROFILING=true

  ingest:
    environment:
      - JAVA_TOOL_OPTIONS=-javaagent:/usr/local/lib/opentelemetry-javaagent.jar
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=DSP_svc_ingest
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_JAVAAGENT_EXTENSIONS=/usr/local/lib/pyroscope-otel.jar
      - PYROSCOPE_SERVER_ADDRESS=http://host.docker.internal:4040
      - PYROSCOPE_APPLICATION_NAME=DSP_svc_ingest
      - PYROSCOPE_FORMAT=jfr
      - PYROSCOPE_PROFILER_ALLOC=512k
      - OTEL_PYROSCOPE_ADD_PROFILE_URL=false
      - OTEL_PYROSCOPE_ADD_PROFILE_BASELINE_URL=false
      - OTEL_PYROSCOPE_START_PROFILING=true

  alloy:
    image: grafana/alloy:latest
    depends_on:
      - db
    ports:
      # Host port 12346 (not Alloy's usual 12345) so this coexists with a
      # separately run Grafana Alloy that already binds 12345 on the host.
      - "12346:12345"  # Alloy component UI
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    restart: unless-stopped
